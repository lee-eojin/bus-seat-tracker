name: Collect bus seats

on:
  workflow_dispatch:
    inputs:
      event-duration-minutes:
        description: '이벤트 모드 수집 시간(분). 비우면 시간대 규칙을 따른다'
        required: false
      event-interval-seconds:
        description: '이벤트 모드 수집 간격(초)'
        required: false
        default: '300'
  schedule:
    - cron: '0 * * * *'      # 매시 기본 스냅샷. 피크 창 안에 떨어지면 루프 백업 시동 역할
    - cron: '30 21 * * 0-4'  # KST 평일 06:30 아침 피크 시동
    - cron: '30 8 * * 1-5'   # KST 평일 17:30 저녁 피크 시동
    - cron: '0 7 * * 6,0'    # KST 주말 16:00 저녁 피크 시동

permissions:
  contents: read

concurrency:
  group: bus-seat-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - id: collection-day
        name: Determine collection day
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.BUS_DATA_REPO_TOKEN }}
          script: |
            const parts = new Intl.DateTimeFormat('en-US', {
              timeZone: 'Asia/Seoul',
              year: 'numeric',
              month: '2-digit',
              day: '2-digit',
            }).formatToParts(new Date());
            const partValue = (type) => parts.find((part) => part.type === type)?.value ?? '';
            const date = `${partValue('year')}-${partValue('month')}-${partValue('day')}`;
            core.setOutput('date', date);
            core.setOutput('branch', `collect/${date}`);

      - name: Archive finished collection day
        uses: actions/github-script@v8
        env:
          COLLECTION_DATE: ${{ steps.collection-day.outputs.date }}
        with:
          github-token: ${{ secrets.BUS_DATA_REPO_TOKEN }}
          script: |
            const [owner, repo] = 'lee-eojin/bus-seat-tracker-data'.split('/');
            const today = process.env.COLLECTION_DATE;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            // GitHub이 과부하로 5xx를 반환하면 몇 분 안에 풀리므로 기다렸다가 다시 시도한다
            async function withRetry(request) {
              for (let attempt = 1; ; attempt += 1) {
                try {
                  return await request();
                } catch (error) {
                  const transient = !error.status || error.status === 429 || error.status >= 500;
                  if (!transient || attempt >= 5) throw error;
                  core.warning(`GitHub API 일시 오류, ${attempt * 15}초 뒤 재시도: ${error.message}`);
                  await sleep(attempt * 15000);
                }
              }
            }
            const references = await withRetry(() => github.paginate(github.rest.git.listMatchingRefs, {
              owner,
              repo,
              ref: 'heads/collect/',
            }));
            const finishedBranches = references
              .map((reference) => reference.ref.replace('refs/heads/', ''))
              .filter((branch) => /^collect\/\d{4}-\d{2}-\d{2}$/.test(branch) && branch.slice('collect/'.length) < today)
              .sort();

            if (finishedBranches.length > 1) {
              throw new Error(`정리되지 않은 일별 브랜치가 ${finishedBranches.join(', ')}입니다. 데이터 손실 방지를 위해 자동 병합을 중단했습니다.`);
            }
            if (finishedBranches.length === 0) return;

            const branch = finishedBranches[0];
            const mainReference = await withRetry(() => github.rest.git.getRef({ owner, repo, ref: 'heads/main' }));
            const branchReference = await withRetry(() => github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` }));
            const comparison = await withRetry(() => github.rest.repos.compareCommits({
              owner,
              repo,
              base: mainReference.data.object.sha,
              head: branchReference.data.object.sha,
            }));

            if (comparison.data.status === 'ahead') {
              const branchCommit = await withRetry(() => github.rest.git.getCommit({ owner, repo, commit_sha: branchReference.data.object.sha }));
              const archiveCommit = await withRetry(() => github.rest.git.createCommit({
                owner,
                repo,
                message: `data: archive bus seats ${branch.slice('collect/'.length)}`,
                tree: branchCommit.data.tree.sha,
                parents: [mainReference.data.object.sha],
              }));
              await withRetry(() => github.rest.git.updateRef({ owner, repo, ref: 'heads/main', sha: archiveCommit.data.sha }));
            } else if (comparison.data.status !== 'identical') {
              throw new Error(`${branch}가 현재 main에서 갈라졌습니다. 데이터 손실 방지를 위해 자동 병합을 중단했습니다.`);
            }

            await withRetry(() => github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` }));

      - name: Prepare collection branch
        uses: actions/github-script@v8
        env:
          COLLECTION_BRANCH: ${{ steps.collection-day.outputs.branch }}
        with:
          github-token: ${{ secrets.BUS_DATA_REPO_TOKEN }}
          script: |
            const [owner, repo] = 'lee-eojin/bus-seat-tracker-data'.split('/');
            const branch = process.env.COLLECTION_BRANCH;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            async function withRetry(request) {
              for (let attempt = 1; ; attempt += 1) {
                try {
                  return await request();
                } catch (error) {
                  const transient = !error.status || error.status === 429 || error.status >= 500;
                  if (!transient || attempt >= 5) throw error;
                  core.warning(`GitHub API 일시 오류, ${attempt * 15}초 뒤 재시도: ${error.message}`);
                  await sleep(attempt * 15000);
                }
              }
            }

            try {
              await withRetry(() => github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` }));
            } catch (error) {
              if (error.status !== 404) throw error;
              const mainReference = await withRetry(() => github.rest.git.getRef({ owner, repo, ref: 'heads/main' }));
              await withRetry(() => github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: mainReference.data.object.sha }));
            }

      - uses: actions/checkout@v5
        with:
          repository: lee-eojin/bus-seat-tracker-data
          token: ${{ secrets.BUS_DATA_REPO_TOKEN }}
          path: private-data
          ref: ${{ steps.collection-day.outputs.branch }}

      - run: npm ci

      - run: npm run build

      - name: Collect until window end
        uses: actions/github-script@v8
        env:
          COLLECTION_BRANCH: ${{ steps.collection-day.outputs.branch }}
          BUS_DATA_DIR: ${{ github.workspace }}/private-data/data
          GYEONGGI_BUS_API_KEY: ${{ secrets.GYEONGGI_BUS_API_KEY }}
          VEHICLE_HASH_SECRET: ${{ secrets.VEHICLE_HASH_SECRET }}
          EVENT_DURATION_MINUTES: ${{ inputs.event-duration-minutes }}
          EVENT_INTERVAL_SECONDS: ${{ inputs.event-interval-seconds }}
        with:
          github-token: ${{ secrets.BUS_DATA_REPO_TOKEN }}
          script: |
            const { execFileSync } = require('node:child_process');
            const fs = require('node:fs/promises');
            const path = require('node:path');

            const [owner, repo] = 'lee-eojin/bus-seat-tracker-data'.split('/');
            const branch = process.env.COLLECTION_BRANCH;
            const workspace = process.env.GITHUB_WORKSPACE;
            const privateDataRoot = path.join(workspace, 'private-data');
            const dataDirectory = path.join(privateDataRoot, 'data');
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            // KST 피크 창. 분 단위: 평일 06:30-10:30, 17:30-21:30 / 주말 16:00-22:00
            // 시동 크론이 스로틀돼도, 창 시작 60분 전 이후에 도착한 어떤 실행이든 창을 이어받는다.
            function activeWindow() {
              const shifted = new Date(Date.now() + 9 * 3600 * 1000);
              const day = shifted.getUTCDay();
              const minutes = shifted.getUTCHours() * 60 + shifted.getUTCMinutes();
              const windows = day === 0 || day === 6 ? [[960, 1320]] : [[390, 630], [1050, 1290]];
              const found = windows.find(([start, end]) => minutes >= start - 60 && minutes < end);
              if (!found) return null;
              const kstMidnightMs = shifted.setUTCHours(0, 0, 0, 0);
              return {
                startMs: kstMidnightMs + found[0] * 60000 - 9 * 3600 * 1000,
                endMs: kstMidnightMs + found[1] * 60000 - 9 * 3600 * 1000,
              };
            }

            let loopStartMs = Date.now();
            let loopEndMs = Date.now();
            let intervalSeconds = 600;
            const eventDuration = Number(process.env.EVENT_DURATION_MINUTES || '');
            if (eventDuration > 0) {
              loopEndMs = Date.now() + eventDuration * 60000;
              intervalSeconds = Number(process.env.EVENT_INTERVAL_SECONDS || '') || 300;
              core.info(`이벤트 모드: ${eventDuration}분 동안 ${intervalSeconds}초 간격 수집`);
            } else {
              const window = activeWindow();
              if (window) {
                loopStartMs = window.startMs;
                loopEndMs = window.endMs;
                core.info(`피크 창 수집: ${new Date(window.endMs).toISOString()}까지 ${intervalSeconds}초 간격`);
              } else {
                core.info('비피크: 1회 스냅샷만 수집');
              }
            }
            // 러너 6시간 한도 보호. 남은 창은 대기 중인 다음 실행이 이어받는다.
            loopEndMs = Math.min(loopEndMs, Date.now() + 320 * 60000);

            async function listFiles(directory) {
              const entries = await fs.readdir(directory, { withFileTypes: true });
              const files = await Promise.all(entries.map(async (entry) => {
                const entryPath = path.join(directory, entry.name);
                return entry.isDirectory() ? listFiles(entryPath) : [entryPath];
              }));
              return files.flat();
            }

            // 체크아웃 시점의 파일은 이미 브랜치에 있으므로 업로드 대상에서 제외한다.
            const uploadedState = new Map();
            async function fileSignature(filePath) {
              const stat = await fs.stat(filePath);
              return `${stat.size}:${stat.mtimeMs}`;
            }
            for (const filePath of await listFiles(dataDirectory)) {
              uploadedState.set(filePath, await fileSignature(filePath));
            }

            async function uploadChangedFiles() {
              const changed = [];
              for (const filePath of await listFiles(dataDirectory)) {
                const signature = await fileSignature(filePath);
                if (uploadedState.get(filePath) !== signature) changed.push([filePath, signature]);
              }
              if (changed.length === 0) return;

              const reference = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
              const previousCommit = await github.rest.git.getCommit({ owner, repo, commit_sha: reference.data.object.sha });
              const tree = await Promise.all(changed.map(async ([filePath]) => {
                const content = await fs.readFile(filePath);
                const blob = await github.rest.git.createBlob({ owner, repo, content: content.toString('base64'), encoding: 'base64' });
                return { path: path.relative(privateDataRoot, filePath), mode: '100644', type: 'blob', sha: blob.data.sha };
              }));
              const nextTree = await github.rest.git.createTree({ owner, repo, base_tree: previousCommit.data.tree.sha, tree });
              const nextCommit = await github.rest.git.createCommit({
                owner,
                repo,
                message: `data: collect bus seats ${new Date().toISOString()}`,
                tree: nextTree.data.sha,
                parents: [reference.data.object.sha],
              });
              await github.rest.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: nextCommit.data.sha });
              for (const [filePath, signature] of changed) uploadedState.set(filePath, signature);
            }

            do {
              try {
                execFileSync('node', ['dist/bus-seat-collector/collector.js', '--once'], {
                  cwd: workspace,
                  stdio: 'inherit',
                  env: process.env,
                });
                await uploadChangedFiles();
              } catch (error) {
                core.warning(`수집 사이클 실패, 다음 사이클에서 재시도: ${error.message}`);
              }
              const now = Date.now();
              if (now < loopStartMs) {
                await sleep(loopStartMs - now);
                continue;
              }
              if (now + intervalSeconds * 1000 >= loopEndMs) break;
              await sleep(intervalSeconds * 1000);
            } while (Date.now() < loopEndMs);
